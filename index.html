<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>meu din din</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#111827">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="meu din din">
    <link rel="apple-touch-icon" href="icons/carteira.png">
    <link rel="icon" type="image/png" href="icons/carteira.png">
    <meta property="og:title" content="meu din din">
    <meta property="og:description" content="App de controle financeiro pessoal simples e bonito">
    <meta property="og:image" content="icons/logo.png">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://meu-dindin.pages.dev/">
    <meta name="twitter:card" content="summary_large_image">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: #f0f2f5; margin:0; padding-bottom: 90px; }
        .app-header { background: #111827; }
        .header-card { background: linear-gradient(135deg, #1a2535 0%, #0f1923 100%); border-radius: 20px; margin: 0 16px; padding: 20px; margin-top: -40px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        .card { background: white; border-radius: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #f1f5f9; z-index: 50; height: 80px; display: flex; align-items: center; justify-content: space-around; padding: 0 8px; box-shadow: 0 -4px 20px rgba(0,0,0,0.08); }
        .nav-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; background: none; border: none; cursor: pointer; color: #94a3b8; font-size: 10px; font-weight: 600; padding: 8px 16px; border-radius: 12px; transition: all 0.2s; }
        .nav-btn:hover { color: #22c55e; }
        .nav-btn i { font-size: 20px; }
        .mic-center-btn { width: 64px; height: 64px; border-radius: 50%; background: linear-gradient(135deg, #22c55e, #16a34a); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 20px rgba(34,197,94,0.5); transition: all 0.2s; margin-top: -20px; }
        .mic-center-btn:active { transform: scale(0.95); }
        .mic-center-btn.recording { background: linear-gradient(135deg, #ef4444, #dc2626) !important; box-shadow: 0 4px 20px rgba(239,68,68,0.6) !important; animation: pulse-mic 1s infinite; }
        @keyframes pulse-mic { 0%,100%{box-shadow:0 4px 20px rgba(239,68,68,0.4)} 50%{box-shadow:0 4px 40px rgba(239,68,68,0.8)} }
        .chart-wave { width:100%; height:60px; opacity:0.8; }
        .tab-btn { white-space: nowrap; padding: 8px 16px; border-radius: 999px; font-size: 13px; font-weight: 600; border: none; cursor: pointer; transition: all 0.2s; }
        .tab-btn.active { background: #111827; color: white; }
        .tab-btn:not(.active) { background: white; color: #64748b; }
        .cat-badge { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 999px; text-transform: uppercase; }
        .cat-RECEITA{background:#dcfce7;color:#166534} .cat-FIXAS{background:#dbeafe;color:#1e40af} .cat-CARTAO{background:#ede9fe;color:#5b21b6} .cat-ALIMENTACAO{background:#fef9c3;color:#854d0e} .cat-LAZER{background:#fce7f3;color:#9d174d} .cat-OUTROS{background:#f1f5f9;color:#475569} .cat-TRANSPORTE{background:#ffedd5;color:#9a3412} .cat-SAUDE{background:#d1fae5;color:#065f46}
        #voice-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:200; display:none; flex-direction:column; align-items:center; justify-content:center; gap:24px; }
        #voice-overlay.active { display:flex; }
        .voice-ripple { width:120px; height:120px; border-radius:50%; background:rgba(34,197,94,0.2); display:flex; align-items:center; justify-content:center; animation: ripple 1.5s infinite; }
        @keyframes ripple { 0%{box-shadow:0 0 0 0 rgba(34,197,94,0.4)} 100%{box-shadow:0 0 0 40px rgba(34,197,94,0)} }
        input[type="number"]::-webkit-inner-spin-button { display: none; }
        /* Dicas */
        .tip-card { background: linear-gradient(135deg, #1a2535 0%, #0f1923 100%); border-radius: 16px; padding: 16px 18px; margin-bottom: 10px; border-left: 4px solid #22c55e; }
        .tip-card .tip-icon { font-size: 22px; margin-right: 10px; }
        /* Confirm Voice */
        #confirm-voice-modal { position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:300; display:none; align-items:flex-end; justify-content:center; }
        #confirm-voice-modal.active { display:flex; }
        .confirm-sheet { background:white; border-radius:24px 24px 0 0; padding:24px 20px 36px; width:100%; max-width:480px; }
    </style>
</head>
<body>

<header class="app-header pt-12 pb-12 px-4">
    <div class="max-w-lg mx-auto flex justify-between items-center">
        <div class="flex items-center">
            <img src="icons/logo.png" alt="meu din din"
                 style="height:64px; object-fit:contain; mix-blend-mode:lighten;"
                 onerror="this.style.display='none';document.getElementById('logo-fallback').style.display='flex'">
            <div id="logo-fallback" style="display:none; align-items:center; gap:10px;">
                <img src="icons/carteira.png" alt=""
                     style="height:52px; mix-blend-mode:lighten;"
                     onerror="this.style.display='none'">
                <div>
                    <p style="color:rgba(255,255,255,0.45);font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;line-height:1">meu</p>
                    <p style="color:white;font-size:22px;font-weight:800;line-height:1.2">din din</p>
                </div>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <select id="currency" class="bg-white/10 border-none rounded-xl px-3 py-2 text-sm text-white outline-none cursor-pointer">
                <option value="R$" class="text-black">R$</option>
                <option value="$" class="text-black">USD</option>
                <option value="€" class="text-black">EUR</option>
            </select>
            <button onclick="shareWhatsApp()" class="bg-white/10 hover:bg-white/20 w-10 h-10 rounded-xl flex items-center justify-center transition" title="WhatsApp">
                <i class="fab fa-whatsapp text-white"></i>
            </button>
            <button onclick="toggleDicas()" class="bg-white/10 hover:bg-white/20 w-10 h-10 rounded-xl flex items-center justify-center transition" title="Dicas">
                <i class="fas fa-lightbulb text-white"></i>
            </button>
        </div>
    </div>
</header>

<div class="max-w-lg mx-auto px-4">
    <div class="header-card">
        <p class="text-white/50 text-xs font-semibold uppercase tracking-wider mb-1">Saldo atual</p>
        <h2 id="total-balance" class="text-white text-3xl font-black mb-4">R$ 0,00</h2>
        <svg class="chart-wave" viewBox="0 0 300 60" preserveAspectRatio="none">
            <defs>
                <linearGradient id="gGreen" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#22c55e" stop-opacity="0.5"/><stop offset="100%" stop-color="#22c55e" stop-opacity="0"/></linearGradient>
                <linearGradient id="gRed" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ef4444" stop-opacity="0.5"/><stop offset="100%" stop-color="#ef4444" stop-opacity="0"/></linearGradient>
            </defs>
            <path d="M0,40 C30,35 60,20 90,25 C120,30 150,10 180,15 C210,20 240,30 300,20 L300,60 L0,60Z" fill="url(#gGreen)"/>
            <path d="M0,40 C30,35 60,20 90,25 C120,30 150,10 180,15 C210,20 240,30 300,20" fill="none" stroke="#22c55e" stroke-width="2"/>
            <path d="M0,50 C40,45 80,55 120,45 C160,35 200,50 240,40 C260,35 280,45 300,42 L300,60 L0,60Z" fill="url(#gRed)"/>
            <path d="M0,50 C40,45 80,55 120,45 C160,35 200,50 240,40 C260,35 280,45 300,42" fill="none" stroke="#ef4444" stroke-width="2"/>
        </svg>
        <div class="flex gap-3 mt-4">
            <div class="flex-1 bg-white/10 rounded-xl p-3">
                <p class="text-white/50 text-xs">Receitas</p>
                <p id="total-income" class="text-green-400 font-bold text-sm">R$ 0,00</p>
            </div>
            <div class="flex-1 bg-white/10 rounded-xl p-3">
                <p class="text-white/50 text-xs">Despesas</p>
                <p id="total-expenses" class="text-red-400 font-bold text-sm">R$ 0,00</p>
            </div>
        </div>
    </div>
</div>

<main class="max-w-lg mx-auto px-4 mt-6">

    <!-- Dicas pré-programadas -->
    <div id="dicas-box" class="hidden mb-5">
        <h3 class="text-slate-700 font-bold text-sm mb-3">💡 Dicas Financeiras</h3>
        <div id="dica-atual" class="tip-card flex items-start">
            <span class="tip-icon"></span>
            <div>
                <p class="text-white font-semibold text-sm" id="dica-titulo"></p>
                <p class="text-white/60 text-xs mt-1" id="dica-texto"></p>
            </div>
        </div>
        <div class="flex gap-2 mt-2">
            <button onclick="dicaAnterior()" class="flex-1 bg-white text-slate-600 text-xs font-bold py-2 rounded-xl border border-slate-200">← Anterior</button>
            <button onclick="dicaProxima()" class="flex-1 bg-white text-slate-600 text-xs font-bold py-2 rounded-xl border border-slate-200">Próxima →</button>
        </div>
    </div>

    <!-- Alerta de saldo -->
    <div id="alerta-box" class="card p-4 mb-5 hidden" style="border-left: 4px solid #22c55e">
        <div class="flex items-start gap-3">
            <div class="w-9 h-9 rounded-xl flex items-center justify-center flex-shrink-0" style="background:#111827">
                <i class="fas fa-chart-pie text-green-400 text-sm"></i>
            </div>
            <div class="flex-1">
                <h4 class="font-bold text-slate-800 text-sm">Análise do mês</h4>
                <p id="alerta-text" class="text-slate-500 text-sm mt-0.5"></p>
            </div>
        </div>
    </div>

    <div class="flex gap-2 mb-4 overflow-x-auto pb-1" style="scrollbar-width:none">
        <button onclick="switchTab('all',this)" class="tab-btn active">Tudo</button>
        <button onclick="switchTab('RECEITA',this)" class="tab-btn">Receitas</button>
        <button onclick="switchTab('FIXAS',this)" class="tab-btn">Fixas</button>
        <button onclick="switchTab('CARTAO',this)" class="tab-btn">Cartões</button>
        <button onclick="switchTab('ALIMENTACAO',this)" class="tab-btn">Alimentação</button>
        <button onclick="switchTab('TRANSPORTE',this)" class="tab-btn">Transporte</button>
        <button onclick="switchTab('SAUDE',this)" class="tab-btn">Saúde</button>
        <button onclick="switchTab('LAZER',this)" class="tab-btn">Lazer</button>
        <button onclick="switchTab('OUTROS',this)" class="tab-btn">Outros</button>
    </div>

    <div id="transaction-list" class="space-y-3 mb-4"></div>
</main>

<nav class="bottom-nav">
    <button class="nav-btn" onclick="toggleModal()">
        <i class="fas fa-plus-circle"></i>
        <span>Adicionar</span>
    </button>
    <button id="mic-center" class="mic-center-btn" onclick="toggleVoiceOverlay()" title="Registrar por voz">
        <i class="fas fa-microphone text-white text-2xl"></i>
    </button>
    <button class="nav-btn" onclick="toggleDicas()">
        <i class="fas fa-lightbulb"></i>
        <span>Dicas</span>
    </button>
</nav>

<!-- Voice Overlay -->
<div id="voice-overlay">
    <p class="text-white/60 text-sm font-medium">Ouvindo...</p>
    <div class="voice-ripple">
        <i class="fas fa-microphone text-green-400 text-4xl"></i>
    </div>
    <p id="voice-transcript" class="text-white text-lg font-bold text-center px-8">Fale seu gasto agora</p>
    <p class="text-white/40 text-xs text-center px-8">Ex: "Gastei 50 reais no mercado" ou "Recebi 3000 de salário"</p>
    <button onclick="stopVoice()" class="bg-white/10 text-white px-8 py-3 rounded-full font-semibold mt-4">✕ Cancelar</button>
</div>

<!-- Confirm Voice Modal -->
<div id="confirm-voice-modal">
    <div class="confirm-sheet">
        <div style="width:40px;height:4px;background:#e5e7eb;border-radius:2px;margin:0 auto 20px;"></div>
        <h3 class="font-black text-slate-800 text-lg mb-4">🎙️ Confirmar lançamento?</h3>
        <div id="confirm-voice-content" class="bg-slate-50 rounded-2xl p-4 mb-5 space-y-3"></div>
        <div class="flex gap-3">
            <button onclick="cancelarVoz()" class="flex-1 py-3 rounded-2xl font-bold text-slate-600 bg-slate-100">Cancelar</button>
            <button onclick="confirmarVoz()" class="flex-1 py-3 rounded-2xl font-bold text-white" style="background:#111827">✅ Confirmar</button>
        </div>
    </div>
</div>

<!-- Add Modal -->
<div id="modal" class="fixed inset-0 bg-black/60 hidden items-center justify-center p-4 z-[60]">
    <div class="bg-white rounded-3xl w-full max-w-md p-6">
        <div class="flex justify-between items-center mb-5">
            <h2 class="text-xl font-black">Nova Transação</h2>
            <button onclick="toggleModal()" class="w-8 h-8 bg-slate-100 rounded-full flex items-center justify-center"><i class="fas fa-times text-slate-500 text-sm"></i></button>
        </div>
        <form id="transaction-form" onsubmit="saveTransaction(event)">
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Descrição</label>
                    <input type="text" id="desc" required class="w-full p-3 rounded-2xl border border-slate-200 outline-none focus:border-green-400" placeholder="Ex: Aluguel, Salário, Gasolina...">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Valor</label>
                        <input type="number" step="0.01" id="amount" required class="w-full p-3 rounded-2xl border border-slate-200 outline-none focus:border-green-400" placeholder="0,00">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Categoria</label>
                        <select id="category" class="w-full p-3 rounded-2xl border border-slate-200 outline-none focus:border-green-400">
                            <option value="RECEITA">💰 Receita</option>
                            <option value="FIXAS">🏠 Despesa Fixa</option>
                            <option value="CARTAO">💳 Cartão</option>
                            <option value="ALIMENTACAO">🍽 Alimentação</option>
                            <option value="TRANSPORTE">🚗 Transporte</option>
                            <option value="SAUDE">🏥 Saúde</option>
                            <option value="LAZER">🎮 Lazer</option>
                            <option value="OUTROS">📦 Outros</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Observações</label>
                    <input type="text" id="obs" class="w-full p-3 rounded-2xl border border-slate-200 outline-none focus:border-green-400" placeholder="Detalhe opcional...">
                </div>
                <button type="submit" class="w-full py-4 rounded-2xl font-black text-lg text-white" style="background:#111827">Salvar</button>
            </div>
        </form>
    </div>
</div>

<script>
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});

// ========== DICAS PRÉ-PROGRAMADAS ==========
const DICAS = [
    { icon:'💰', titulo:'Regra 50-30-20', texto:'Divida sua renda: 50% para necessidades, 30% para desejos e 20% para poupança ou dívidas. Uma fórmula simples e eficaz.' },
    { icon:'🏦', titulo:'Reserva de emergência', texto:'Guarde pelo menos 3 a 6 meses dos seus gastos mensais em uma conta de fácil acesso. Comece com pequenos valores.' },
    { icon:'📊', titulo:'Controle seus gastos fixos', texto:'Despesas fixas acima de 60% da renda é um sinal de alerta. Renegocie contratos e planos quando possível.' },
    { icon:'💳', titulo:'Cuidado com o cartão de crédito', texto:'Pague sempre o valor total da fatura. Os juros do rotativo chegam a 400% ao ano — um dos maiores do mundo.' },
    { icon:'🎯', titulo:'Defina metas financeiras', texto:'Ter um objetivo claro (viagem, carro, casa) aumenta a motivação para economizar. Coloque um prazo e valor.' },
    { icon:'🛒', titulo:'Lista antes de comprar', texto:'Antes de ir ao mercado, faça uma lista e siga ela. Compras por impulso são uma das principais fontes de desperdício.' },
    { icon:'📈', titulo:'Invista o quanto antes', texto:'O tempo é seu maior aliado nos investimentos. Mesmo R$ 100 por mês aplicados por 20 anos fazem diferença enorme.' },
    { icon:'🔔', titulo:'Revise assinaturas', texto:'Streaming, academia, apps — some tudo. Muitas pessoas pagam por serviços que mal usam. Cancele o desnecessário.' },
    { icon:'🍽️', titulo:'Alimentação consome muito', texto:'Comer fora é prático mas caro. Preparar refeições em casa pode reduzir seus gastos com alimentação em até 60%.' },
    { icon:'🚗', titulo:'Transporte inteligente', texto:'Calcule o custo real do seu carro (seguro, IPVA, combustível, manutenção). Às vezes o transporte público sai bem mais barato.' },
];

let dicaIndex = 0;
function renderDica() {
    const d = DICAS[dicaIndex];
    document.getElementById('dica-atual').querySelector('.tip-icon').textContent = d.icon;
    document.getElementById('dica-titulo').textContent = d.titulo;
    document.getElementById('dica-texto').textContent = d.texto;
}
function dicaProxima() { dicaIndex = (dicaIndex + 1) % DICAS.length; renderDica(); }
function dicaAnterior() { dicaIndex = (dicaIndex - 1 + DICAS.length) % DICAS.length; renderDica(); }
function toggleDicas() {
    const box = document.getElementById('dicas-box');
    box.classList.toggle('hidden');
    if (!box.classList.contains('hidden')) renderDica();
}

// ========== DADOS ==========
let transactions = JSON.parse(localStorage.getItem('meudindin_data')) || [
    {id:1,desc:'Salário',amount:5000,category:'RECEITA',obs:'Receita mensal',date:new Date().toISOString()},
    {id:2,desc:'Aluguel',amount:1200,category:'FIXAS',obs:'Despesa fixa',date:new Date().toISOString()},
    {id:3,desc:'Cartão Visa',amount:450,category:'CARTAO',obs:'Parcela 1/3',date:new Date().toISOString()},
    {id:4,desc:'Gasolina',amount:80,category:'TRANSPORTE',obs:'Posto Shell',date:new Date().toISOString()},
    {id:5,desc:'Lanchonete',amount:25,category:'ALIMENTACAO',obs:'Almoço',date:new Date().toISOString()}
];
let currentTab='all', recognition=null, isRecording=false;
let voiceParsed = null;

const CAT_CONFIG={
    RECEITA:{icon:'fa-arrow-up',bg:'bg-green-100',text:'text-green-600',label:'Receita'},
    FIXAS:{icon:'fa-home',bg:'bg-blue-100',text:'text-blue-600',label:'Fixa'},
    CARTAO:{icon:'fa-credit-card',bg:'bg-purple-100',text:'text-purple-600',label:'Cartão'},
    ALIMENTACAO:{icon:'fa-utensils',bg:'bg-yellow-100',text:'text-yellow-600',label:'Alimentação'},
    TRANSPORTE:{icon:'fa-car',bg:'bg-orange-100',text:'text-orange-600',label:'Transporte'},
    SAUDE:{icon:'fa-heartbeat',bg:'bg-emerald-100',text:'text-emerald-600',label:'Saúde'},
    LAZER:{icon:'fa-gamepad',bg:'bg-pink-100',text:'text-pink-600',label:'Lazer'},
    OUTROS:{icon:'fa-box',bg:'bg-slate-100',text:'text-slate-600',label:'Outros'}
};

// ========== PARSE DE VOZ ==========
const CAT_KEYWORDS = {
    RECEITA: ['salário','salario','recebi','entrada','renda','freelance','pagamento','recebimento','ganho','ganhos','recebo'],
    FIXAS: ['aluguel','condomínio','condominio','financiamento','prestação','prestacao','conta de luz','internet','água','agua','gás','gas','energia','telefone','boleto'],
    CARTAO: ['cartão','cartao','visa','mastercard','crédito','credito','débito','debito','parcela','fatura'],
    ALIMENTACAO: ['mercado','supermercado','restaurante','lanche','comida','pizza','hambúrguer','hamburguer','almoço','almoco','jantar','café','cafe','padaria','delivery','ifood','feira'],
    TRANSPORTE: ['gasolina','uber','ônibus','onibus','metrô','metro','táxi','taxi','combustível','combustivel','posto','passagem','99','cabify'],
    SAUDE: ['farmácia','farmacia','médico','medico','hospital','remédio','remedio','consulta','exame','academia','dentista','plano de saúde'],
    LAZER: ['cinema','bar','show','jogo','netflix','spotify','viagem','passeio','festa','parque','praia','balada','entretenimento','disney','amazon prime']
};

function detectarCategoria(text) {
    const lower = text.toLowerCase();
    for (const [cat, words] of Object.entries(CAT_KEYWORDS)) {
        for (const w of words) {
            if (lower.includes(w)) return cat;
        }
    }
    return 'OUTROS';
}

function extrairValor(text) {
    const padroes = [
        /(\d+(?:[.,]\d{1,2})?)\s*(?:reais?|real|dólares?|euros?|R\$|\$|€)/i,
        /(?:R\$|\$|€)\s*(\d+(?:[.,]\d{1,2})?)/i,
        /(\d+(?:[.,]\d{1,2})?)/
    ];
    for (const p of padroes) {
        const m = text.match(p);
        if (m) return parseFloat(m[1].replace(',','.'));
    }
    return null;
}

// ========== VOZ ==========
function toggleVoiceOverlay() {
    if (isRecording) { stopVoice(); return; }
    startVoice();
}

function startVoice() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { alert('Use o Chrome para reconhecimento de voz.'); return; }
    recognition = new SR();
    recognition.lang = 'pt-BR';
    recognition.interimResults = true;
    recognition.maxAlternatives = 1;

    recognition.onstart = () => {
        isRecording = true;
        document.getElementById('voice-overlay').classList.add('active');
        document.getElementById('mic-center').classList.add('recording');
    };

    recognition.onresult = (e) => {
        const transcript = Array.from(e.results).map(r => r[0].transcript).join('');
        document.getElementById('voice-transcript').textContent = '"' + transcript + '"';
        if (e.results[e.results.length-1].isFinal) {
            stopVoice();
            processarVoz(transcript);
        }
    };

    recognition.onend = () => stopVoice();
    recognition.onerror = () => stopVoice();
    recognition.start();
}

function stopVoice() {
    isRecording = false;
    if (recognition) { try { recognition.stop(); } catch(e){} }
    document.getElementById('voice-overlay').classList.remove('active');
    document.getElementById('mic-center').classList.remove('recording');
    document.getElementById('voice-transcript').textContent = 'Fale seu gasto agora';
}

function processarVoz(text) {
    const valor = extrairValor(text);
    if (!valor) {
        alert('Não consegui identificar um valor.\nTente: "Gastei 50 reais no mercado"');
        return;
    }
    const categoria = detectarCategoria(text);
    const desc = text.charAt(0).toUpperCase() + text.slice(1).substring(0, 50);
    voiceParsed = { desc, amount: valor, category: categoria, obs: '' };

    const cur = document.getElementById('currency').value;
    const cfg = CAT_CONFIG[categoria];
    document.getElementById('confirm-voice-content').innerHTML = `
        <div class="flex justify-between items-center py-1">
            <span class="text-slate-400 text-sm">Descrição</span>
            <span class="font-semibold text-slate-800 text-sm text-right max-w-[60%]">${desc}</span>
        </div>
        <div class="flex justify-between items-center py-1">
            <span class="text-slate-400 text-sm">Valor</span>
            <span class="font-black text-lg ${categoria==='RECEITA'?'text-green-500':'text-red-500'}">${categoria==='RECEITA'?'+':'-'} ${cur} ${valor.toLocaleString('pt-BR',{minimumFractionDigits:2})}</span>
        </div>
        <div class="flex justify-between items-center py-1">
            <span class="text-slate-400 text-sm">Categoria</span>
            <span class="cat-badge cat-${categoria}">${cfg.label}</span>
        </div>
    `;
    document.getElementById('confirm-voice-modal').classList.add('active');
}

function confirmarVoz() {
    if (!voiceParsed) return;
    transactions.push({ id: Date.now(), ...voiceParsed, date: new Date().toISOString() });
    saveToLocal();
    cancelarVoz();
}

function cancelarVoz() {
    document.getElementById('confirm-voice-modal').classList.remove('active');
    voiceParsed = null;
}

// ========== RENDER ==========
function saveToLocal() { localStorage.setItem('meudindin_data', JSON.stringify(transactions)); render(); updateAlerta(); }

function toggleModal() {
    const m = document.getElementById('modal');
    m.classList.toggle('hidden'); m.classList.toggle('flex');
    document.getElementById('transaction-form').reset();
}

function saveTransaction(e) {
    e.preventDefault();
    transactions.push({
        id: Date.now(),
        desc: document.getElementById('desc').value,
        amount: parseFloat(document.getElementById('amount').value),
        category: document.getElementById('category').value,
        obs: document.getElementById('obs').value,
        date: new Date().toISOString()
    });
    saveToLocal(); toggleModal();
}

function deleteTransaction(id) {
    if (!confirm('Excluir esta transação?')) return;
    transactions = transactions.filter(t => t.id !== id);
    saveToLocal();
}

function switchTab(tab, btn) {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
}

function updateSummary() {
    const cur = document.getElementById('currency').value;
    const income = transactions.filter(t => t.category === 'RECEITA').reduce((s,t) => s+t.amount, 0);
    const expense = transactions.filter(t => t.category !== 'RECEITA').reduce((s,t) => s+t.amount, 0);
    const fmt = v => `${cur} ${v.toLocaleString('pt-BR',{minimumFractionDigits:2})}`;
    document.getElementById('total-income').innerText = fmt(income);
    document.getElementById('total-expenses').innerText = fmt(expense);
    document.getElementById('total-balance').innerText = fmt(income - expense);
}

function updateAlerta() {
    const box = document.getElementById('alerta-box');
    const txt = document.getElementById('alerta-text');
    const expense = transactions.filter(t => t.category !== 'RECEITA').reduce((s,t) => s+t.amount, 0);
    const income = transactions.filter(t => t.category === 'RECEITA').reduce((s,t) => s+t.amount, 0);
    box.classList.remove('hidden');
    if (!income) { txt.innerText = 'Adicione sua receita para ver a análise do mês.'; return; }
    if (expense > income) txt.innerText = '⚠️ Gastos superaram a receita! Revise seus lançamentos.';
    else if (expense > income * 0.7) txt.innerText = '💡 Mais de 70% da renda comprometida. Confira as dicas!';
    else if (expense < income * 0.5) txt.innerText = '🎉 Ótimo controle! Você está gastando menos da metade da renda.';
    else txt.innerText = '✅ Finanças equilibradas. Continue assim!';
}

function render() {
    const list = document.getElementById('transaction-list');
    list.innerHTML = '';
    const cur = document.getElementById('currency').value;
    const filtered = currentTab === 'all' ? transactions : transactions.filter(t => t.category === currentTab);
    if (!filtered.length) {
        list.innerHTML = '<p class="text-center text-slate-400 py-10">Nenhuma transação encontrada.</p>';
        updateSummary(); return;
    }
    filtered.sort((a,b) => new Date(b.date) - new Date(a.date)).forEach(t => {
        const isIncome = t.category === 'RECEITA';
        const cfg = CAT_CONFIG[t.category] || CAT_CONFIG.OUTROS;
        const div = document.createElement('div');
        div.className = 'card p-4 flex justify-between items-center';
        div.innerHTML = `
            <div class="flex items-center gap-3">
                <div class="${cfg.bg} ${cfg.text} w-11 h-11 rounded-2xl flex items-center justify-center flex-shrink-0">
                    <i class="fas ${cfg.icon} text-base"></i>
                </div>
                <div>
                    <h4 class="font-bold text-slate-800 text-sm">${t.desc}</h4>
                    <div class="flex items-center gap-2 mt-0.5">
                        <span class="cat-badge cat-${t.category}">${cfg.label}</span>
                        ${t.obs ? `<span class="text-xs text-slate-400">${t.obs}</span>` : ''}
                    </div>
                </div>
            </div>
            <div class="text-right flex-shrink-0 ml-2">
                <p class="font-black text-base ${isIncome?'text-green-500':'text-red-500'}">${isIncome?'+':'-'} ${cur} ${t.amount.toLocaleString('pt-BR',{minimumFractionDigits:2})}</p>
                <button onclick="deleteTransaction(${t.id})" class="text-[10px] text-slate-300 hover:text-red-400 uppercase font-bold">excluir</button>
            </div>`;
        list.appendChild(div);
    });
    updateSummary();
}

function shareWhatsApp() {
    const cur = document.getElementById('currency').value;
    const income = transactions.filter(t => t.category === 'RECEITA').reduce((s,t) => s+t.amount, 0);
    const expense = transactions.filter(t => t.category !== 'RECEITA').reduce((s,t) => s+t.amount, 0);
    const fmt = v => `${cur} ${v.toLocaleString('pt-BR',{minimumFractionDigits:2})}`;
    window.open(`https://wa.me/?text=${encodeURIComponent(`*💰 meu din din - Resumo do Mês*\n\n✅ Receitas: ${fmt(income)}\n❌ Despesas: ${fmt(expense)}\n─────────────────\n💵 Saldo: ${fmt(income-expense)}\n\n_meu-dindin.pages.dev_`)}`,'_blank');
}

document.getElementById('currency').addEventListener('change', updateSummary);
render();
updateAlerta();
</script>
</body>
</html>
